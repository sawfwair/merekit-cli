name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 10.8.1
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Detect bundled adapter changes
        id: adapter_changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          base="$BASE_SHA"
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            base="HEAD^"
          fi
          if git diff --quiet "$base" HEAD -- adapters; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify release provenance for changed adapter bundles
        if: steps.adapter_changes.outputs.changed == 'true'
        run: pnpm check:adapter-provenance
      - run: pnpm verify
      - run: pnpm docs:build
