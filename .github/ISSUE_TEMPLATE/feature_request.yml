name: Feature request
description: Suggest a CLI workflow or documentation improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Mere CLI do instead?
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety notes
      description: Mention any auth, mutation, MCP, or adapter-surface concerns.
